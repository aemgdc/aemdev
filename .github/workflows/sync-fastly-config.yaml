name: Sync Fastly CDN config
on:
  workflow_dispatch:
    inputs:
      service_id:
        description: Fastly service ID (defaults to the FASTLY_SERVICE_ID repo variable)
        required: false
        type: string
  schedule:
    # Daily snapshot so config drift in the Fastly UI shows up as a commit.
    - cron: '17 6 * * *'

permissions:
  contents: write

jobs:
  syncFastly:
    environment:
      name: main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Resolve service ID
        id: cfg
        run: |
          SERVICE_ID="${{ inputs.service_id || vars.FASTLY_SERVICE_ID }}"
          if [ -z "$SERVICE_ID" ]; then
            echo "::error::No Fastly service ID. Set the FASTLY_SERVICE_ID repo variable or pass the service_id input."
            exit 1
          fi
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"
      - name: Sync Fastly config
        env:
          FASTLY_API_TOKEN: ${{ secrets.FASTLY_API_TOKEN }}
          FASTLY_SERVICE_ID: ${{ steps.cfg.outputs.service_id }}
        run: node scripts/sync-fastly.mjs
      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/fastly
          if git diff --cached --quiet; then
            echo "No Fastly config changes to commit"
            exit 0
          fi
          git commit -m "Sync Fastly CDN config"
          git push
